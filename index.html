<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hoornbeeck Amersfoort Kaart</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      #map {
        height: 100%;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
      const map = L.map("map").setView(
        [52.13833167003659, 5.352840982630621],
        16,
      );
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "© OpenStreetMap bijdragers",
      }).addTo(map);
      const hoornbeeck = L.marker([52.13835673266698, 5.353025834896225]).addTo(
        map,
      );
      hoornbeeck.bindPopup("<b>Busstop 1</b>");
      const waypoint2 = L.marker([52.138307899775164, 5.353058963801621]).addTo(
        map,
      );
      waypoint2.bindPopup("<b>Busstop 2</b>");
      const waypoint3 = L.marker([52.13821982659582, 5.35312333682444]).addTo(
        map,
      );
      waypoint3.bindPopup("<b>Busstop 3</b>");
    </script>
  </body>
</html>
